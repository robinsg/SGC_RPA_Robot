definitions:
  submit_enter: &submit_enter
    type: "send_key"
    key: "Enter"
    description: "Send Enter"

name: "Sample Login Script"
description: "Logs into a TN5250 session and checks the main menu"
tmux_session: "5250_robot"

steps:
  - type: "wait_for_text"
    text: "Sign On"
    description: "Wait for the sign-on screen"
    timeout_seconds: 20

  - type: "send_text"
    text: "${USERNAME}"
    description: "Enter user name"

  - type: "send_key"
    key: "Tab"
    description: "Move to password field"

  - type: "send_text"
    text: "${PASSWORD}"
    description: "Enter password"

  - type: "sleep"
    seconds: 0.5
    description: "Pause briefly before submitting"   
  
  - *submit_enter

  - type: "press_key_if_text_present"
    text: "Sign-on Information"
    key: "Enter"
    timeout_seconds: 10
    description: "Acknowledge optional Sign On Information display"

  - type: "wait_for_text"
    text: "IBM i Main Menu"
    description: "Ensure we reached the main menu"
    row: 1
    col: 33
    timeout_seconds: 10 # It's good practice to have a timeout to prevent infinite hangs

#  - type: "wait_for_text"
#    text: "Selection or command"
#    description: "Check for prompt in a specific block"
#    row: 19
#    col: 2
#    end_row: 21
#    end_col: 40

#  - type: "wait_for_text"
#    text: "CPF"
#    is_message_line: true
#    description: "Listen for dynamic error messages on the status line"
#    timeout_seconds: 5

  - type: "send_text"
    text: "wrkactjob"
    description: "wrkactjob command"

  - *submit_enter

  - type: "send_key"
    key: "F3"
    description: "Exit WRKACTJOB"

  - type: "wait_for_text"
    text: "IBM i Main Menu"
    description: "Ensure we returned to the main menu"
    timeout_seconds: 10

  - type: "send_text"
    text: "signoff"
    description: "signoff command"

  - type: "send_key"
    key: "Field_exit"
    description: "Field Exit"

  - *submit_enter

  - type: "wait_for_text"
    text: "Sign On"
    description: "Wait for Sign On display"
    timeout_seconds: 10

  - type: "capture"
    filename: "last_screen.txt"
    description: "Save final state"
