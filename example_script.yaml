name: "Sample Login Script"
description: "Logs into a TN5250 session and checks the main menu"
tmux_session: "5250_robot"

steps:
  - type: "wait_for_text"
    text: "Sign On"
    description: "Wait for the sign-on screen"
    timeout_seconds: 20

  - type: "send_text"
    text: "${USERNAME}"
    description: "Enter user name"

  - type: "send_key"
    key: "Tab"
    description: "Move to password field"

  - type: "send_text"
    text: "${PASSWORD}"
    description: "Enter password"

  - type: "sleep"
    seconds: 0.5
    description: "Pause briefly before submitting"   
  
  - type: "send_key"
    key: "Enter"
    description: "Submit sign-on"

  - type: "press_key_if_text_present"
    text: "Sign-on Information"
    key: "Enter"
    description: "Acknowledge optional Sign On Information display"

  - type: "wait_for_text"
    text: "IBM i Main Menu"
    description: "Ensure we reached the main menu"
    row: 1
    col: 33
    timeout_seconds: 10 # It's good practice to have a timeout to prevent infinite hangs

  - type: "capture"
    filename: "Main_menu"
    description: "Capture the screen after sign in Information"

  - type: "wait_for_text"
    text: "Selection or command"
    description: "Check for prompt in a specific block"
    row: 19
    col: 2
    end_row: 21
    end_col: 40

#  - type: "wait_for_text"
#    text: "CPF"
#    is_message_line: true
#    description: "Listen for dynamic error messages on the status line"
#    timeout_seconds: 5

  - type: "send_key"
    key: "F3"
    description: "Exit session"

  - type: "capture"
    filename: "last_screen.txt"
    description: "Save final state"
